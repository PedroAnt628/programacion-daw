<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${producto.id} != null ? 'Editar producto' : 'Crear producto'">Producto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    <h1 th:text="${producto.id} != null ? 'Editar producto' : 'Crear producto'">Formulario</h1>
    <form th:action="${producto.id} != null ? @{/productos/{id}/editar(id=${producto.id})} : @{/productos}" method="post" th:object="${producto}">
        <div>
            <label>Nombre:</label>
            <input type="text" th:field="*{name}" required />
        </div>
        <div>
            <label>Descripción:</label>
            <textarea th:field="*{descripcion}" rows="3" required></textarea>
        </div>
        <div>
            <label>Precio:</label>
            <input type="number" step="0.01" th:field="*{precio}" required />
        </div>
        <div>
            <label>Imagen (URL):</label>
            <input type="text" th:field="*{imagen}" />
        </div>
        <div>
            <label>Categoría:</label>
            <input type="text" th:field="*{categoria}" required />
        </div>
        <div>
            <button type="submit">Guardar</button>
            <a th:href="@{/productos}">Cancelar</a>
        </div>
    </form>
</body>
</html>
