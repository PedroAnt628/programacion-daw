<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Productos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    <h1>Lista de productos</h1>
    <div>
        <a th:href="@{/productos/nuevo}">Crear nuevo producto</a>
    </div>
    <div>
        <form action="#" th:action="@{/productos}" method="get">
            <label>Filtrar por categoría:</label>
            <input type="text" name="categoria" th:value="${categoria}" />
            <button type="submit">Filtrar</button>
            <a th:href="@{/productos}">Mostrar todos</a>
        </form>
    </div>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.id}">1</td>
                <td th:text="${producto.name}">Nombre</td>
                <td th:text="${producto.descripcion}">Descripción</td>
                <td th:text="${producto.precio}">0.00</td>
                <td th:text="${producto.categoria}">Categoria</td>
                <td>
                    <a th:href="@{/productos/{id}(id=${producto.id})}">Ver</a>
                    <a th:href="@{/productos/{id}/editar(id=${producto.id})}">Editar</a>
                    <form th:action="@{/productos/{id}/eliminar(id=${producto.id})}" method="post" style="display:inline">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
