<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pokédex Spring Boot</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pokemon.css}">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/pokemon">PokeApi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">Seleccionar Generación
                </button>
                <ul class="dropdown-menu">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/pokemon/generacion/1}">Primera generación</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/pokemon/generacion/2}">Segunda generación</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/pokemon/generacion/3}">Tercera generación</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <div class="row g-4">
            <div class="col-lg-3 col-md-4 col-sm-6" th:each="pokemon : ${pokemons}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${pokemon.imagen}" class="card-img-top" alt="pokemon">
                    <div class="card-body">
                        <h5 class="card-title">
                            <span th:text="${pokemon.numero}"></span> - <span th:text="${pokemon.nombre}"></span>
                        </h5>
                        <a th:href="@{/pokemon/{id}(id=${pokemon.numero})}" class="btn btn-primary">
                            Ver detalle
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
