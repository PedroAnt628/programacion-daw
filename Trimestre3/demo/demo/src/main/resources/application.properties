# Nombre de la aplicación y puerto (el que tú elegiste)
spring.application.name=demo
server.port=9999

# Configuración de la base de datos H2 (Guardando en carpeta /data)
spring.datasource.url=jdbc:h2:file:./data/demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate: Esto crea las tablas automáticamente basándose en tus clases @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Importante para que JPA use el lenguaje correcto de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2 para ver las tablas en el navegador (localhost:9999/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desactivar caché para ver cambios en HTML al instante
spring.thymeleaf.cache=false